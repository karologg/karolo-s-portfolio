    <link rel="stylesheet" href="css/header.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fuzzy+Bubbles:wght@400;700&family=Rubik+Mono+One&display=swap" rel="stylesheet">

</head>
<body>
    <header>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="index.html">home</a></li>
                <li><a href="profile.html">profile</a></li>

            </ul>
        </nav>
    </header>
    <div class="content">
        <h1>
            mural de mensagens:
        </h1>
        <h4>
            deixe uma mensagem para mim ou outros visitantes!
        </h4>

        <p></p>
    </div>

    <div class="content">
        <div class="mensagens">
            <form id="msg-form" class="mural-form">
                <div class="message-input">
                    <label class="msg" for="msg">mensagem</label>
                    <textarea id="msg" name="msg" rows="3" placeholder="digite aqui sua mensagem" required></textarea>
                </div>
                <div class="sign-input">
                    <label class="sign" for="sign">assinatura</label>
                    <input id="sign" name="sign" type="text" placeholder="digite aqui seu nome ou assinatura" required>
                </div>
                <button type="submit">adicionar</button>
            </form>
            <div class="mural-item" id="msg-list">
                <div class="mural-item-icon">
                    <img src="img/post-it.webp" alt="post-it">
                    <p class="mural-temp">este é um exemplo de mensagem, deixe a sua aqui! — karolo</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
